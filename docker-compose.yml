services:
  kindleflow:
    build: .
    container_name: kindleflow
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATA_DIR: /app/data
      DB_PATH: /app/data/kindleflow.sqlite
      INVITE_CODES_FILE: /app/data/invite-codes.txt
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      INVITE_CODE: ${INVITE_CODE:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - ./data:/app/data
