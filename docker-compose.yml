services:
  tailscale-kindleflow:
    image: tailscale/tailscale:latest
    container_name: tailscale-kindleflow
    hostname: tailscale-kindleflow
    restart: unless-stopped
    profiles:
      - tailscale
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_HOSTNAME: kindleflow
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
      TS_USERSPACE: "false"
      TS_EXTRA_ARGS: --reset
    volumes:
      - ${TAILSCALE_STATE_DIR:-./tailscale/state}:/var/lib/tailscale
      - ${TAILSCALE_CONFIG_DIR:-./tailscale/config}:/config
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    networks:
      - proxy-net

  kindleflow:
    image: ${KINDLEFLOW_IMAGE:-ghcr.io/tjegbejimba/kindleflow:latest}
    container_name: kindleflow
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATA_DIR: /app/data
      DB_PATH: /app/data/kindleflow.sqlite
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      # Auth: header-trust only. The container must sit behind a reverse proxy
      # that injects X-Auth-Request-Email. Remove the host port binding above
      # once Caddy / Tinyauth is in front, so the only way to reach KindleFlow
      # is through the trusted proxy.
      NODE_ENV: ${NODE_ENV:-production}
      AUTH_DEV_BYPASS: ${AUTH_DEV_BYPASS:-false}
      AUTH_DEV_EMAIL: ${AUTH_DEV_EMAIL:-dev@kindleflow.local}
      AUTH_TRUSTED_PROXY_SECRET: ${AUTH_TRUSTED_PROXY_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SUBSTACK_COOKIE: ${SUBSTACK_COOKIE:-}
      SUBSTACK_COOKIE_HOSTS: ${SUBSTACK_COOKIE_HOSTS:-}
    volumes:
      - ./data:/app/data
    networks:
      - proxy-net
      - kindleflow-net
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      caddy: kindleflow.tjegbejimba.com
      caddy.tls: /etc/caddy/origin.pem /etc/caddy/origin.key
      caddy.@public_assets.path: "/assets/* /logo.svg /manifest.webmanifest /sw.js"
      caddy.handle: "@public_assets"
      caddy.handle.reverse_proxy: "{{upstreams 3000}}"
      caddy.handle_1: "*"
      caddy.handle_1.import: "tinyauth_forwarder *"
      caddy.handle_1.reverse_proxy: "{{upstreams 3000}}"
      caddy.handle_1.reverse_proxy.header_up: "X-Auth-Request-Proxy-Secret ${AUTH_TRUSTED_PROXY_SECRET:-}"

networks:
  proxy-net:
    external: true
  kindleflow-net:
    external: true
