services:
  tailscale-kindleflow:
    image: tailscale/tailscale:latest
    container_name: tailscale-kindleflow
    hostname: tailscale-kindleflow
    restart: unless-stopped
    profiles:
      - tailscale
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_HOSTNAME: kindleflow
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
      TS_USERSPACE: "false"
      TS_EXTRA_ARGS: --reset
    volumes:
      - ${TAILSCALE_STATE_DIR:-./tailscale/state}:/var/lib/tailscale
      - ${TAILSCALE_CONFIG_DIR:-./tailscale/config}:/config
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module

  kindleflow:
    image: ghcr.io/tjegbejimba/kindleflow:latest
    container_name: kindleflow
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "${PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATA_DIR: /app/data
      DB_PATH: /app/data/kindleflow.sqlite
      INVITE_CODES_FILE: /app/data/invite-codes.txt
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      INVITE_CODE: ${INVITE_CODE:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-180}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SUBSTACK_COOKIE: ${SUBSTACK_COOKIE:-}
      SUBSTACK_COOKIE_HOSTS: ${SUBSTACK_COOKIE_HOSTS:-}
    volumes:
      - ./data:/app/data
